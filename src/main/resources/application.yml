spring:
  datasource:  # MySQL dataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/markettrio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 
#    hikari:   # HikariCP settings
#      minimumIdle: 5
#      maximumPoolSize: 20
#      idleTimeout: 30000
#      connectionTimeout: 30000
#      maxLifetime: 2000000
#      poolName: HikariPool          
  mvc:  
    view:     # JSP views
      prefix: /WEB-INF/jsp/
      suffix: .jsp
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    generate-ddl: false
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        # do not changes camel case to snake case, which is the default spring.jpa.hibernate.naming.implicit-strategy 
  thymeleaf:      # Thymeleaf views
    cache: false
#    view-names: thyme/**/*
    #prefix: classpath:/templates/ (default value)
    #suffix: .html (defalut value)
  devtools:
    livereload:
      enabled: true
      
mybatis:
  type-aliases-package: com.marketTrio.domain
  mapper-locations: classpath:/com/marketTrio/dao/mybatis/mapper/*.xml
#  mapper-locations: com/example/jpetstore/dao/mybatis/mapper/**/*.xml
  
logging:
  level:
    com:
        marketTrio:
           dao:
              mybatis:
                mapper: DEBUG           
    org:
        hibernate: INFO  
          
server:
  port: 8088
  error:
    whitelabel:
      enabled: false
    path: /error