# MySQL dataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/markettrio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=seha
spring.datasource.password=seha

# JSP views
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Thymeleaf views
# spring.thymeleaf.prefix=classpath:/templates/ (default value)
# spring.thymeleaf.suffix=.html (defalut value)
spring.thymeleaf.cache=false
#spring.thymeleaf.view-names=thyme/**/*

mybatis.type-aliases-package=com.marketTrio
# 프로젝트 매퍼만 로드 (classpath JAR의 mapper 경로 제외. 톰캣 JAR의 .../catalina/mapper/...는 더 이상 매칭되지 않고 우리 Mapper XML만 읽음)
# MyBatis가 톰캣 내부 XML까지 매퍼로 읽어버리는 버그를 막기 위한 필수 수정
mybatis.mapper-locations=classpath*:com/marketTrio/**/mapper/**/*.xml

spring.devtools.livereload.enabled=true

logging.level.com.marketTrio.dao.mybatis.mapper=DEBUG
logging.level.org.hibernate=info

spring.jpa.generate-ddl=false
# spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# do not changes camel case to snake case, which is the default spring.jpa.hibernate.naming.implicit-strategy 

server.port=8080